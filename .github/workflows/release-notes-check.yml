name: Release notes check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    if: startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: ver
        name: Parse version from branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Release branch must match release/vX.Y.Z exactly (got '$BRANCH')"
            exit 1
          fi
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry exists and is dated
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if ! grep -qE "^## ${VERSION} \([0-9]{4}-[0-9]{2}-[0-9]{2}\)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must have a dated section '## ${VERSION} (YYYY-MM-DD)' for the release branch ${BRANCH}."
            exit 1
          fi
          SECTION=$(awk -v ver="${VERSION}" '
            $0 ~ "^## " ver " \\(" { found=1; next }
            found && /^## [0-9]+\.[0-9]+\.[0-9]+ \(/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$SECTION" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md section for ${VERSION} is empty"
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Choose a new version."
            exit 1
          fi

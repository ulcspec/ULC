name: Validator CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: go test + goreleaser check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: |
          mkdir -p bin
          go build -o bin/ulc ./tools/validator/cmd/ulc

      - name: Validate example records end-to-end
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          records=(examples/**/*.ulc examples/**/*.ulc.json)
          if [ "${#records[@]}" -eq 0 ]; then
            echo "No example ULC records found; skipping validation."
            exit 0
          fi
          for f in "${records[@]}"; do
            echo "Validating $f"
            ./bin/ulc validate "$f"
          done
        shell: bash

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
          workdir: tools/validator

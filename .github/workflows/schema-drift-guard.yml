name: Schema drift guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Resolve every $ref across schema files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Schema $ref drift guard
        run: python3 tools/schema-drift-guard.py

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Build ulc CLI
        run: |
          mkdir -p bin
          go build -o bin/ulc ./tools/validator/cmd/ulc

      - name: Verify generated index on example records
        run: |
          shopt -s globstar nullglob
          records=(examples/**/*.ulc examples/**/*.ulc.json)
          if [ "${#records[@]}" -eq 0 ]; then
            echo "No example ULC records found; skipping index parity check."
            exit 0
          fi
          fail=0
          for f in "${records[@]}"; do
            echo "Checking $f"
            if ! ./bin/ulc build-index --check "$f"; then
              fail=1
            fi
          done
          exit $fail
        shell: bash

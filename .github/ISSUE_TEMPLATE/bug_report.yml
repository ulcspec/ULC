name: Bug report
description: Report a bug in the validator, CI tooling, or build system
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for bugs in the `ulc` validator binary, CI workflows,
        build scripts, or any tooling. For ambiguity in the spec itself, use the
        "Spec clarification" template instead.
  - type: input
    id: version
    attributes:
      label: ULC validator version
      description: Output of `ulc version`
      placeholder: "ulc 0.5.0 (builder 0.2.0)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify in description)
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands and any input files (or links to them).
      render: shell
    validations:
      required: true
